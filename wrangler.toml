[[migrations]]
tag = "v1"
database_name = "sekolahku-db"
directory = "migrations"

[vars]
GOOGLE_CLIENT_ID = "601722467761-8l1fsbl0e1cskq4r9rgv1rab5qa39s6e.apps.googleusercontent.com"
ALLOWED_ORIGIN = "http://localhost:5173"

[env.production.vars]
ALLOWED_ORIGIN = "https://sekolahku.pages.dev"

